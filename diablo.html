<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diablo 1 - Retro Game Vault</title>
    <!-- Načtení emulátoru js-dos z internetu, aby to hned fungovalo -->
    <link rel="stylesheet" href="https://js-dos.com/v8/js-dos.css">
    <script src="https://js-dos.com/v8/js-dos.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
        }
        #header-bar {
            background-color: #111;
            padding: 10px;
            text-align: center;
        }
        .back-btn {
            padding: 8px 15px;
            background-color: #555;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }
        .back-btn:hover {
            background-color: #777;
        }
        #game-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="header-bar">
        <a href="index.html" class="back-btn">⬅ Zpět na rozcestník</a>
    </div>

    <!-- Tady se spustí samotná hra -->
    <div id="game-container"></div>

    <script>
        // Inicializace DOS emulátoru a natažení hry z tvého Cloudflare R2
        Dos(document.getElementById("game-container"))
            .run("https://d29dbbc4eb60434541aba3172a18973f.r2.cloudflarestorage.com/retrogamevault/diablo1.zip");
    </script>

</body>
</html>
