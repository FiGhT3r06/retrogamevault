<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Retro Herní Trezor</title>
    <!-- Stabilní CDN pro v86 -->
    <script src="https://cdn.jsdelivr.net/gh/copy/v86@master/build/libv86.js"></script>
</head>
<body style="background:#000; color:#fff; font-family:sans-serif; text-align:center; padding-top:20px;">
    <h1>Retro Herní Trezor</h1>
    <input type="password" id="pass" placeholder="Heslo...">
    <button onclick="start()">Vstoupit</button>
    <div id="screen" style="width:100%; height:80vh; margin-top:20px;"></div>

    <script>
        function start() {
            if (document.getElementById('pass').value !== 'Slaviapraha1892') {
                alert("Špatné heslo");
                return;
            }

            // DETEKCE: Zjistíme, jak se emulátor po načtení jmenuje
            const V86Constructor = window.V86Starter || window.V86 || window.v86;

            if (!V86Constructor) {
                alert("CHYBA: Emulátor se nenačetl. Zkontroluj konzoli (F12).");
                return;
            }

            new V86Constructor({
                wasm_path: "https://cdn.jsdelivr.net/gh/copy/v86@master/build/v86.wasm",
                bios: { url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/seabios.bin" },
                vga_bios: { url: "https://cdn.jsdelivr.net/gh/copy/v86@master/bios/vgabios.bin" },
                hda: { url: "https://pub-0a65454d925f42baa6be6550b056fbe8.r2.dev/RetroXP.img", async: true },
                screen_container: document.getElementById('screen'),
                autostart: true
            });
        }
    </script>
</body>
</html>
