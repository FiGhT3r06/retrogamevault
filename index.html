<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Herní Trezor - Windows XP</title>
    
    <!-- Stabilní a oficiální vydání emulátoru (žádné experimenty) -->
    <script src="https://unpkg.com/v86/build/libv86.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        #login-screen { text-align: center; background: #222; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        #login-screen h1 { font-size: 24px; margin-bottom: 20px; color: #0078d7; }
        #password-input { padding: 12px; width: 250px; border-radius: 6px; border: 1px solid #444; background: #333; color: #fff; text-align: center; font-size: 16px; margin-bottom: 15px; outline: none; }
        #login-btn { padding: 12px 30px; border: none; border-radius: 6px; background: #0078d7; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: background 0.2s; }
        #login-btn:hover { background: #005a9e; }
        #login-error { color: #ff4d4d; margin-top: 10px; font-size: 14px; display: none; }

        #menu-screen { width: 100%; max-width: 900px; padding: 20px; display: none; text-align: center; max-height: 100vh; overflow-y: auto; }
        #menu-screen h2 { margin-bottom: 25px; color: #0078d7; font-size: 28px; text-transform: uppercase; letter-spacing: 1px; }
        .slots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .slot-card { background: #222; border: 1px solid #333; border-radius: 10px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; transition: transform 0.2s, border-color 0.2s; }
        .slot-card:hover { transform: translateY(-5px); border-color: #0078d7; }
        .slot-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; color: #eee; }
        .slot-status { font-size: 13px; color: #888; margin-bottom: 15px; }
        .slot-btn { width: 100%; padding: 10px; border: none; border-radius: 6px; background: #22c55e; color: white; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .slot-btn:hover { background: #16a34a; }

        #emulator-screen { width: 100vw; height: 100vh; display: none; flex-direction: column; background: #000; }
        .control-bar { height: 50px; background: #222; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; border-bottom: 1px solid #333; }
        .active-slot-info { font-weight: bold; color: #0078d7; font-size: 16px; }
        .control-buttons { display: flex; gap: 15px; }
        .control-btn { padding: 8px 16px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; }
        .save-btn { background: #0078d7; }
        .save-btn:hover { background: #005a9e; }
        .exit-btn { background: #dc2626; }
        .exit-btn:hover { background: #b91c1c; }
        
        #v86-screen { flex: 1; width: 100%; height: calc(100vh - 50px); overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #v86-screen canvas { display: block; max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Retro Herní Trezor</h1>
        <input type="password" id="password-input" placeholder="Zadej přístupové heslo...">
        <br>
        <button id="login-btn" onclick="checkPassword()">Vstoupit do trezoru</button>
        <div id="login-error">Nesprávné heslo! Zkus to znovu.</div>
    </div>

    <div id="menu-screen">
        <h2>Výběr paměťového slotu</h2>
        <div class="slots-grid" id="slots-container"></div>
    </div>

    <div id="emulator-screen">
        <div class="control-bar">
            <div class="active-slot-info" id="current-slot-display">Aktivní slot: Žádný</div>
            <div class="control-buttons">
                <button class="control-btn save-btn" onclick="saveCurrentState()">💾 ULOŽIT STAV</button>
                <button class="control-btn exit-btn" onclick="exitEmulator()">❌ UKONČIT HRU</button>
            </div>
        </div>
        <div id="v86-screen"></div>
    </div>

    <script>
        let v86Instance = null;
        let currentSlotId = null;
        const dbName = "RetroXP_Databaze_Slotu";

        function checkPassword() {
            const pass = document.getElementById("password-input").value;
            if (pass === "Slaviapraha1892") {
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("menu-screen").style.display = "block";
                initSlotsMenu();
            } else {
                const err = document.getElementById("login-error");
                err.style.display = "block";
                document.getElementById("password-input").value = "";
            }
        }

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains("sloty")) {
                        db.createObjectStore("sloty");
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function checkSlotData(slotId) {
            const db = await openDB();
            const tx = db.transaction("sloty", "readonly");
            const store = tx.objectStore("sloty");
            const request = store.get(slotId);
            return new Promise((resolve) => {
                request.onsuccess = () => resolve(request.result ? true : false);
            });
        }

        async function getSlotState(slotId) {
            const db = await openDB();
            const tx = db.transaction("sloty", "readonly");
            const store = tx.objectStore("sloty");
            const request = store.get(slotId);
            return new Promise((resolve) => request.onsuccess = () => resolve(request.result));
        }

        async function saveSlotState(slotId, buffer) {
            const db = await openDB();
            const tx = db.transaction("sloty", "readwrite");
            const store = tx.objectStore("sloty");
            store.put(buffer, slotId);
            return new Promise((resolve) => tx.oncomplete = resolve);
        }

        async function initSlotsMenu() {
            const container = document.getElementById("slots-container");
            container.innerHTML = "";
            
            for (let i = 1; i <= 10; i++) {
                const slotId = `slot_${i}`;
                const hasData = await checkSlotData(slotId);
                
                const card = document.createElement("div");
                card.className = "slot-card";
                card.innerHTML = `
                    <div class="slot-title">Slot ${i}</div>
                    <div class="slot-status" id="status-${slotId}">${hasData ? "🟢 Uložená pozice existuje" : "⚪ Prázdný slot (Čistý start)"}</div>
                    <button class="slot-btn" onclick="launchSlot('${slotId}', ${i})">${hasData ? "Načíst a Spustit" : "Spustit čisté XP"}</button>
                `;
                container.appendChild(card);
            }
        }

        async function launchSlot(slotId, slotNumber) {
            currentSlotId = slotId;
            document.getElementById("menu-screen").style.display = "none";
            document.getElementById("emulator-screen").style.display = "flex";
            document.getElementById("current-slot-display").innerText = `Aktivní slot: Slot ${slotNumber}`;
            document.getElementById("v86-screen").innerHTML = "";

            const savedBuffer = await getSlotState(slotId);

            let config = {
                // Přepsáno na stabilní UNPKG servery
                wasm_path: "https://unpkg.com/v86/build/v86.wasm",
                memory_size: 512 * 1024 * 1024,
                vga_memory_size: 16 * 1024 * 1024,
                screen_container: document.getElementById("v86-screen"),
                bios: { url: "https://unpkg.com/v86/bios/seabios.bin" },
                vga_bios: { url: "https://unpkg.com/v86/bios/vgabios.bin" },
                
                // Tvůj Cloudflare R2 Disk
                hda: { url: "https://pub-0a65454d925f42baa6be6550b056fbe8.r2.dev/RetroXP.img", async: true },
                
                // Síťový multiplayer
                network_relay_url: "wss://relay.widgetry.org/",
                
                autostart: true,
            };

            if (savedBuffer) {
                config.initial_state = { buffer: savedBuffer };
            }

            // A konečně používáme starý dobrý V86Starter
            v86Instance = new V86Starter(config);
        }

        function saveCurrentState() {
            if (!v86Instance || !currentSlotId) return;

            alert("Spouštím ukládání. Během ukládání na nic neklikaj a počkej na potvrzení.");

            v86Instance.save_state().then(async function(buffer) {
                if (buffer) {
                    await saveSlotState(currentSlotId, buffer);
                    alert("💾 Stav úspěšně uložen do tvého prohlížeče!");
                } else {
                    alert("Chyba: Nepodařilo se vygenerovat otisk paměti.");
                }
            }).catch(function(err) {
                alert("Chyba při ukládání: " + err);
            });
        }

        function exitEmulator() {
            if (confirm("Opravdu chceš ukončit Windows XP? Neuložený postup bude ztracen.")) {
                if (v86Instance) {
                    v86Instance.destroy();
                    v86Instance = null;
                }
                document.getElementById("emulator-screen").style.display = "none";
                document.getElementById("menu-screen").style.display = "block";
                initSlotsMenu();
            }
        }
        
        document.getElementById("password-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        });
    </script>
</body>
</html>
