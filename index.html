<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Game Vault - Windows XP</title>
    
    <script src="https://copy.sh/v86/build/libv86.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
        }
        input[type="password"] {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
        }
        button:hover {
            background-color: #333;
        }
        .hidden {
            display: none !important;
        }
        .grid-slots {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 20px auto;
        }
        .slot-btn {
            padding: 15px;
            background-color: #f0f0f0;
            color: black;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .slot-btn:hover {
            background-color: #e0e0e0;
        }
        .system-action {
            display: block;
            margin: 20px auto;
            padding: 15px 30px;
            width: 250px;
            background-color: #0053e1; /* Typická Windows XP modrá */
            color: white;
            border: none;
            font-weight: bold;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .system-action:hover {
            background-color: #0042b4;
        }
        #emulator-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
            display: flex;
            flex-direction: column;
        }
        #game-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }
        #emulator-screen button {
            background-color: #333;
            margin: 10px;
            align-self: flex-start;
        }
        /* Styl pro plátno Windows XP emulátoru */
        #v86-screen {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #v86-screen canvas {
            max-width: 100%;
            max-height: calc(100vh - 60px);
        }
    </style>
</head>
<body>

    <div id="login-screen" class="container">
        <h2>Zadej přístupové heslo:</h2>
        <input type="password" id="password-input" placeholder="Heslo...">
        <button onclick="checkPassword()">Vstoupit</button>
        <p id="error-msg" style="color: red; display: none;">Nesprávné heslo!</p>
    </div>

    <div id="vault-screen" class="container hidden">
        <h1>Retro Game Vault</h1>
        <h3>Vyber si volný slot pro spuštění systému:</h3>
        <div class="grid-slots">
            <script>
                for (let i = 1; i <= 10; i++) {
                    document.write(`<button class="slot-btn" onclick="selectSlot(${i})">Slot ${i} (Volný)</button>`);
                }
            </script>
        </div>
    </div>

    <div id="game-screen" class="container hidden">
        <h2 id="selected-slot-title"></h2>
        <h3>Systém je připraven ke spuštění</h3>
        <div>
            <button onclick="startWinXP()" class="system-action">Spustit Windows XP</button>
        </div>
        <br>
        <button onclick="backToSlots()" style="background-color: gray;">Zpět na sloty</button>
    </div>

    <div id="emulator-screen" class="hidden">
        <button onclick="exitGame()" style="color: white; font-weight: bold;">⬅ Vypnout Windows XP</button>
        <div id="game-container"></div>
    </div>

    <script>
        let currentSlot = null;
        let v86Instance = null;

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === "Slaviapraha1892") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('vault-screen').classList.remove('hidden');
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function selectSlot(slotNumber) {
            currentSlot = slotNumber;
            document.getElementById('selected-slot-title').innerText = `Vybral jsi: Slot ${slotNumber}`;
            document.getElementById('vault-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        }

        function backToSlots() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('vault-screen').classList.remove('hidden');
        }

        // FUNKCE: Spuštění Windows XP přes v86 emulátor
        function startWinXP() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('emulator-screen').classList.remove('hidden');
            
            // Příprava čistého kontejneru pro zobrazení systému
            document.getElementById("game-container").innerHTML = '<div id="v86-screen"></div>';

            v86Instance = new V86Starter({
                wasm_path: "https://copy.sh/v86/build/v86.wasm",
                memory_size: 512 * 1024 * 1024, // 512 MB RAM pro plynulý běh
                vga_memory_size: 16 * 1024 * 1024,
                screen_container: document.getElementById("v86-screen"),
                bios: { url: "https://copy.sh/v86/bios/seabios.bin" },
                vga_bios: { url: "https://copy.sh/v86/bios/vgabios.bin" },
                
                // === ZDE ZMĚŇ URL ZA SVOJÍ ADRESU Z CLOUDFLARE R2 ===
                hda: { url: "https://pub-0a65454d925f42baa6be6550b056fbe8.r2.dev/winxp.img", async: true },
                
                autostart: true,
            });
        }

        function exitGame() {
            // Bezpečné ukončení emulace Windows XP a uvolnění paměti RAM v prohlížeči
            if (v86Instance) {
                try { v86Instance.stop(); } catch(e) {}
                v86Instance = null;
            }
            
            document.getElementById('game-container').innerHTML = '';
            document.getElementById('emulator-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
