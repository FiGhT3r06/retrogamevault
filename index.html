<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Retro Herní Trezor</title>
    <script src="https://unpkg.com/v86/build/libv86.js"></script>
    <style>
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        #login-ui { text-align: center; }
        #emulator-ui { display: none; width: 100%; height: 100%; }
        input { padding: 10px; }
        button { padding: 10px 20px; background: #0078d7; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-ui">
        <h1>Retro Herní Trezor</h1>
        <input type="password" id="pass" placeholder="Heslo...">
        <br><br>
        <button onclick="enter()">Vstoupit</button>
    </div>

    <div id="emulator-ui">
        <div id="v86-container" style="width: 100%; height: 100%;"></div>
    </div>

    <script>
        function enter() {
            if (document.getElementById('pass').value === 'Slaviapraha1892') {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('emulator-ui').style.display = 'block';
                startEmulator();
            } else {
                alert("Špatné heslo");
            }
        }

        function startEmulator() {
            const config = {
                wasm_path: "https://unpkg.com/v86/build/v86.wasm",
                bios: { url: "https://unpkg.com/v86/bios/seabios.bin" },
                vga_bios: { url: "https://unpkg.com/v86/bios/vgabios.bin" },
                hda: { url: "https://pub-0a65454d925f42baa6be6550b056fbe8.r2.dev/RetroXP.img", async: true },
                screen_container: document.getElementById('v86-container'),
                autostart: true,
                memory_size: 512 * 1024 * 1024,
                vga_memory_size: 16 * 1024 * 1024,
                network_relay_url: "wss://relay.widgetry.org/"
            };

            // Univerzální spouštěč (vybere, co je zrovna dostupné)
            const Emulator = window.V86Starter || window.V86;
            if (Emulator) {
                new Emulator(config);
            } else {
                alert("Chyba: Emulátor se nepodařilo načíst (zkontroluj připojení k internetu).");
            }
        }
    </script>
</body>
</html>
